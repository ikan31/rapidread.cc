<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RapidRead — RSVP Speed Reader</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- pdf.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

    /* ORP word spans */
    #w-before {
      position: absolute;
      top: 50%;
      right: 65%;
      transform: translateY(-50%);
      font-size: clamp(2rem, 10vw, 7rem);
      line-height: 1;
      white-space: nowrap;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace;
      user-select: none;
    }
    #w-pivot { color: #c0392b; }

    /* Hide scrollbar on textarea but keep scroll */
    textarea::-webkit-scrollbar { width: 4px; }
    textarea::-webkit-scrollbar-track { background: transparent; }
    textarea::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

    /* Progress bar cursor */
    #progress-bar { cursor: pointer; }

    /* Range input styling */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    .dark input[type=range] { background: #444; }
    .light input[type=range] { background: #ccc; }

    /* Drop zone hover */
    #drop-zone.drag-over {
      border-color: #6366f1;
      background-color: rgba(99, 102, 241, 0.05);
    }
  </style>
</head>

<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen font-sans transition-colors duration-200">

  <!-- ───────────── INPUT VIEW ───────────── -->
  <div id="input-view" class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-800">
      <span class="text-lg font-semibold tracking-tight">RapidRead</span>
      <button id="dark-toggle-input" onclick="toggleDark()" class="p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Toggle dark mode">
        <svg id="sun-icon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 6.343l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <svg id="moon-icon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </header>

    <!-- Main content -->
    <main class="flex-1 flex flex-col items-center justify-center px-4 py-10 max-w-2xl mx-auto w-full">
      <h1 class="text-3xl font-bold mb-2 text-center">Speed Read Anything</h1>
      <p class="text-gray-500 dark:text-gray-400 text-center mb-8">Upload a file or paste text. Words will flash one at a time.</p>

      <!-- Tabs -->
      <div class="flex w-full mb-4 border-b border-gray-200 dark:border-gray-800">
        <button id="tab-upload" onclick="switchTab('upload')" class="tab-btn px-5 py-2 text-sm font-medium border-b-2 border-gray-900 dark:border-white text-gray-900 dark:text-white -mb-px transition-colors">
          Upload File
        </button>
        <button id="tab-paste" onclick="switchTab('paste')" class="tab-btn px-5 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400 dark:text-gray-500 -mb-px hover:text-gray-700 dark:hover:text-gray-300 transition-colors">
          Paste Text
        </button>
      </div>

      <!-- Upload tab -->
      <div id="panel-upload" class="w-full">
        <div id="drop-zone"
          class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-xl p-10 text-center cursor-pointer hover:border-gray-400 dark:hover:border-gray-500 transition-colors"
          onclick="document.getElementById('file-input').click()"
          ondragover="onDragOver(event)"
          ondragleave="onDragLeave(event)"
          ondrop="onDrop(event)">
          <svg class="mx-auto w-10 h-10 text-gray-400 dark:text-gray-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          <p class="text-gray-500 dark:text-gray-400 text-sm mb-1">Drag & drop a file here, or <span class="underline">browse</span></p>
          <p class="text-gray-400 dark:text-gray-600 text-xs">Supports .txt and .pdf</p>
        </div>
        <input id="file-input" type="file" accept=".txt,.pdf" class="hidden" onchange="onFileSelected(event)" />
        <div id="file-status" class="mt-3 text-sm text-gray-500 dark:text-gray-400 text-center hidden"></div>
      </div>

      <!-- Paste tab -->
      <div id="panel-paste" class="w-full hidden">
        <textarea id="paste-input"
          class="w-full h-52 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl p-4 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-gray-400 dark:focus:ring-gray-600 transition-colors"
          placeholder="Paste your text here..."
          oninput="updateWordCount()"></textarea>
        <div id="word-count" class="mt-2 text-xs text-gray-400 dark:text-gray-600 text-right">0 words</div>
      </div>

      <!-- WPM selector -->
      <div class="w-full mt-6">
        <div class="flex items-center justify-between mb-2">
          <label class="text-sm font-medium text-gray-600 dark:text-gray-400">Target Speed</label>
          <span id="wpm-display-input" class="text-sm font-semibold tabular-nums">300 WPM</span>
        </div>
        <input id="wpm-slider-input" type="range" min="100" max="1000" step="25" value="300"
          class="w-full bg-gray-200 dark:bg-gray-700"
          oninput="syncWpm(this.value)" />
        <div class="flex justify-between text-xs text-gray-400 dark:text-gray-600 mt-1">
          <span>100</span><span>500</span><span>1000</span>
        </div>
      </div>

      <!-- Error message -->
      <div id="error-msg" class="w-full mt-4 text-sm text-red-500 text-center hidden"></div>

      <!-- Start button -->
      <button id="start-btn" onclick="startReading()"
        class="mt-6 w-full py-3 rounded-xl bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-semibold text-sm hover:bg-gray-700 dark:hover:bg-gray-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        Start Reading
      </button>

      <p class="mt-8 text-xs text-gray-400 dark:text-gray-600 text-center">
        Tip: use <kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-xs">Space</kbd> to pause · <kbd class="px-1 py-0.5 bg-gray-100 dark:bg-gray-800 rounded text-xs">← →</kbd> to skip words
      </p>
    </main>
  </div>

  <!-- ───────────── READER VIEW ───────────── -->
  <div id="reader-view" class="hidden fixed inset-0 bg-white dark:bg-gray-950 flex flex-col">

    <!-- Exit button -->
    <button onclick="resetReader()" title="Back to home"
      class="absolute top-4 right-4 z-10 p-2 rounded-full text-gray-500 hover:text-white hover:bg-gray-800 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

    <!-- Word display area — ORP anchored at 35% from left -->
    <div class="flex-1 relative">
      <span id="w-before" class="text-gray-900 dark:text-white"></span>
      <span id="w-right-group" class="text-gray-900 dark:text-white" style="position: absolute; top: 50%; left: 35%; transform: translateY(-50%); white-space: nowrap; font-size: clamp(2rem, 10vw, 7rem); line-height: 1; font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; user-select: none;"><span id="w-pivot"></span><span id="w-after"></span></span>
    </div>

    <!-- Controls bar -->
    <div class="bg-gray-100/90 dark:bg-gray-900/90 backdrop-blur-sm border-t border-gray-200 dark:border-gray-800 px-4 py-3">

      <!-- Progress bar -->
      <div id="progress-bar" onclick="seekTo(event)"
        class="w-full h-1.5 bg-gray-300 dark:bg-gray-700 rounded-full mb-3 relative overflow-hidden">
        <div id="progress-fill" class="h-full bg-gray-900 dark:bg-white rounded-full transition-none" style="width: 0%"></div>
      </div>

      <!-- Controls row -->
      <div class="flex items-center gap-3 sm:gap-4">

        <!-- Reset button -->
        <button onclick="restartWords()" title="Restart from beginning" class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-400 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12a9 9 0 109-9M3 3v4h4"/>
          </svg>
        </button>

        <!-- Play/Pause -->
        <button id="play-pause-btn" onclick="togglePlayPause()"
          class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:bg-gray-700 dark:hover:bg-gray-200 transition-colors flex-shrink-0">
          <svg id="play-icon" class="w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="pause-icon" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 24 24">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <!-- Word counter -->
        <span id="word-counter" class="text-xs text-gray-500 dark:text-gray-500 tabular-nums whitespace-nowrap flex-shrink-0">0 / 0</span>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- WPM display + slider -->
        <div class="flex items-center gap-2">
          <span id="wpm-display-reader" class="text-xs text-gray-500 dark:text-gray-400 tabular-nums whitespace-nowrap">300 WPM</span>
          <input id="wpm-slider-reader" type="range" min="100" max="1000" step="25" value="300"
            class="w-24 sm:w-32 bg-gray-300 dark:bg-gray-700"
            oninput="syncWpm(this.value)" />
        </div>

        <!-- Dark mode toggle -->
        <button onclick="toggleDark()" class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors text-gray-400 hover:text-gray-900 dark:hover:text-white ml-1" title="Toggle dark mode">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 6.343l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>

      </div>
    </div>
  </div>

  <!-- ───────────── JAVASCRIPT ───────────── -->
  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let words = [];
    let wordIndex = 0;
    let isPlaying = false;
    let timeoutId = null;
    let targetWPM = 300;
    let activeTab = 'upload';
    let loadedText = '';

    const RAMP_WORDS = 50;

    // ── Dark mode ──────────────────────────────────────────────────────────
    function toggleDark() {
      document.documentElement.classList.toggle('dark');
    }

    // ── Tab switching ──────────────────────────────────────────────────────
    function switchTab(tab) {
      activeTab = tab;
      const tabs = ['upload', 'paste'];
      tabs.forEach(t => {
        const btn = document.getElementById('tab-' + t);
        const panel = document.getElementById('panel-' + t);
        const active = t === tab;
        btn.classList.toggle('border-gray-900', active);
        btn.classList.toggle('dark:border-white', active);
        btn.classList.toggle('text-gray-900', active);
        btn.classList.toggle('dark:text-white', active);
        btn.classList.toggle('border-transparent', !active);
        btn.classList.toggle('text-gray-400', !active);
        btn.classList.toggle('dark:text-gray-500', !active);
        panel.classList.toggle('hidden', !active);
      });
      clearError();
    }

    // ── Word count for paste tab ───────────────────────────────────────────
    function updateWordCount() {
      const text = document.getElementById('paste-input').value.trim();
      const count = text ? text.split(/\s+/).filter(Boolean).length : 0;
      document.getElementById('word-count').textContent = count.toLocaleString() + ' words';
    }

    // ── WPM sync (both sliders stay in sync) ──────────────────────────────
    function syncWpm(val) {
      targetWPM = parseInt(val);
      document.getElementById('wpm-slider-input').value = val;
      document.getElementById('wpm-slider-reader').value = val;
      document.getElementById('wpm-display-input').textContent = val + ' WPM';
      document.getElementById('wpm-display-reader').textContent = val + ' WPM';
    }

    // ── File drag & drop ───────────────────────────────────────────────────
    function onDragOver(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.add('drag-over');
    }
    function onDragLeave(e) {
      document.getElementById('drop-zone').classList.remove('drag-over');
    }
    function onDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    }
    function onFileSelected(e) {
      const file = e.target.files[0];
      if (file) handleFile(file);
    }

    async function handleFile(file) {
      clearError();
      const status = document.getElementById('file-status');
      status.textContent = 'Loading...';
      status.classList.remove('hidden');
      loadedText = '';

      try {
        if (file.name.endsWith('.pdf')) {
          loadedText = await extractPdfText(file);
        } else if (file.name.endsWith('.txt') || file.type === 'text/plain') {
          loadedText = await readTextFile(file);
        } else {
          throw new Error('Unsupported file type. Please use .txt or .pdf.');
        }
        const count = parseWords(loadedText).length;
        status.textContent = `"${file.name}" — ${count.toLocaleString()} words loaded`;
      } catch (err) {
        status.classList.add('hidden');
        showError(err.message || 'Failed to load file.');
      }
    }

    function readTextFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = () => reject(new Error('Could not read file.'));
        reader.readAsText(file);
      });
    }

    async function extractPdfText(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n';
      }
      return text;
    }

    // ── Word parsing ───────────────────────────────────────────────────────
    function parseWords(text) {
      return text.trim().split(/\s+/).filter(Boolean);
    }

    // ── Error display ──────────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function clearError() {
      document.getElementById('error-msg').classList.add('hidden');
    }

    // ── Start reading ──────────────────────────────────────────────────────
    function startReading() {
      clearError();
      let text = '';

      if (activeTab === 'upload') {
        if (!loadedText) {
          showError('Please upload a file first.');
          return;
        }
        text = loadedText;
      } else {
        text = document.getElementById('paste-input').value;
        if (!text.trim()) {
          showError('Please paste some text first.');
          return;
        }
      }

      words = parseWords(text);
      if (words.length === 0) {
        showError('No words found in the text.');
        return;
      }

      wordIndex = 0;
      isPlaying = false;

      document.getElementById('input-view').classList.add('hidden');
      document.getElementById('reader-view').classList.remove('hidden');

      updateWordDisplay();
      updateProgress();
      updateCounter();
      play();
    }

    // ── Restart from word 0 (stays in reader) ─────────────────────────────
    function restartWords() {
      pause();
      wordIndex = 0;
      updateWordDisplay();
      updateProgress();
      updateCounter();
      play();
    }

    // ── Reset (back to main page) ──────────────────────────────────────────
    function resetReader() {
      pause();
      words = [];
      wordIndex = 0;
      loadedText = '';
      document.getElementById('file-status').classList.add('hidden');
      document.getElementById('file-input').value = '';
      document.getElementById('reader-view').classList.add('hidden');
      document.getElementById('input-view').classList.remove('hidden');
      document.getElementById('w-before').textContent = '';
      document.getElementById('w-pivot').textContent = '';
      document.getElementById('w-after').textContent = '';
    }

    // ── Playback ───────────────────────────────────────────────────────────
    function play() {
      if (wordIndex >= words.length) {
        wordIndex = 0; // restart if at end
      }
      isPlaying = true;
      setPlayPauseIcon(true);
      scheduleNext();
    }

    function pause() {
      isPlaying = false;
      setPlayPauseIcon(false);
      if (timeoutId) {
        clearTimeout(timeoutId);
        timeoutId = null;
      }
    }

    function togglePlayPause() {
      if (isPlaying) pause();
      else play();
    }

    function scheduleNext() {
      if (!isPlaying) return;
      showWord(wordIndex);
      if (wordIndex < words.length - 1) {
        const delay = getDelayMs(wordIndex);
        timeoutId = setTimeout(() => {
          wordIndex++;
          scheduleNext();
        }, delay);
      } else {
        // End of text
        isPlaying = false;
        setPlayPauseIcon(false);
      }
    }

    function getDelayMs(idx) {
      const startWPM = Math.max(80, targetWPM * 0.5);
      const progress = Math.min(idx / RAMP_WORDS, 1);
      const wpm = startWPM + (targetWPM - startWPM) * progress;
      const base = 60_000 / wpm;

      const word = words[idx] || '';
      if (/[.!?…]$/.test(word)) return base * 2.5;  // sentence end
      if (/[,;:]$/.test(word))  return base * 1.5;   // mid-sentence pause

      return base;
    }

    // ── ORP calculation ────────────────────────────────────────────────────
    // Returns the index of the letter that should sit at the fixed anchor point.
    // 1–3 chars → 1st letter, 4–6 → 2nd, 7–9 → 3rd, 10+ → 4th
    function getOrp(word) {
      const len = word.length;
      if (len <= 3) return 0;
      if (len <= 6) return 1;
      if (len <= 9) return 2;
      return 3;
    }

    function renderWord(word) {
      const w = word || '';
      const orp = getOrp(w);
      document.getElementById('w-before').textContent = w.slice(0, orp);
      document.getElementById('w-pivot').textContent = w[orp] || '';
      document.getElementById('w-after').textContent = w.slice(orp + 1);
    }

    // ── Display ────────────────────────────────────────────────────────────
    function showWord(idx) {
      renderWord(words[idx]);
      updateProgress();
      updateCounter();
    }

    function updateWordDisplay() {
      renderWord(words[wordIndex]);
    }

    function updateProgress() {
      const pct = words.length > 1 ? (wordIndex / (words.length - 1)) * 100 : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    function updateCounter() {
      document.getElementById('word-counter').textContent =
        (wordIndex + 1).toLocaleString() + ' / ' + words.length.toLocaleString();
    }

    function setPlayPauseIcon(playing) {
      document.getElementById('play-icon').classList.toggle('hidden', playing);
      document.getElementById('pause-icon').classList.toggle('hidden', !playing);
    }

    // ── Seek (click progress bar) ──────────────────────────────────────────
    function seekTo(e) {
      const bar = document.getElementById('progress-bar');
      const rect = bar.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const newIndex = Math.round(pct * (words.length - 1));
      const wasPlaying = isPlaying;
      pause();
      wordIndex = newIndex;
      updateWordDisplay();
      updateProgress();
      updateCounter();
      if (wasPlaying) play();
    }

    // ── Keyboard shortcuts ─────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      // Only active in reader view
      if (document.getElementById('reader-view').classList.contains('hidden')) return;

      if (e.code === 'Space') {
        e.preventDefault();
        togglePlayPause();
      } else if (e.code === 'ArrowRight') {
        e.preventDefault();
        const wasPlaying = isPlaying;
        pause();
        wordIndex = Math.min(wordIndex + 1, words.length - 1);
        updateWordDisplay();
        updateProgress();
        updateCounter();
        if (wasPlaying) play();
      } else if (e.code === 'ArrowLeft') {
        e.preventDefault();
        const wasPlaying = isPlaying;
        pause();
        wordIndex = Math.max(wordIndex - 1, 0);
        updateWordDisplay();
        updateProgress();
        updateCounter();
        if (wasPlaying) play();
      }
    });
  </script>
</body>
</html>
